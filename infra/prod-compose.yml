# Chronicle prod stack — canonical compose file for the production VPS.
#
# Deployed to /opt/ovp/docker-compose.yml on the prod VPS via the
# GitHub Actions deploy workflows in chronicle-data-api and chronicle-bot.
# The workflows curl this file from raw.githubusercontent.com/sessionhelper/
# sessionhelper-hub/main/infra/prod-compose.yml before restarting the stack.
#
# .env lives alongside it on the VPS (chmod 600, not committed). See
# sessionhelper-hub-private/infra/collector.md for the env var catalog.
#
# Prod runs a subset of the Chronicle stack: postgres + data-api + collector.
# The worker, feeders, and dev-only E2E harness live on the dev VPS only.
# For the full dev stack see infra/dev-compose.yml.
#
# Services share the `ovp` bridge network and address each other by service
# name (e.g. collector → data-api:8001). OVP-prefixed identifiers (network,
# volume, postgres user/db) are the *dataset* identity and are preserved
# across the ttrpg-collector → chronicle-bot rename.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ovp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ovp_data_api
    volumes:
      - ovp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovp -d ovp_data_api"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ovp

  data-api:
    image: ghcr.io/sessionhelper/chronicle-data-api:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ovp:${POSTGRES_PASSWORD}@postgres:5432/ovp_data_api
      BIND_ADDR: 0.0.0.0:8001
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      SHARED_SECRET: ${SHARED_SECRET}
      RUST_LOG: chronicle_data_api=info,tower_http=info
    # Loopback-only on host; sibling containers reach it via the ovp network.
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - ovp

  collector:
    image: ghcr.io/sessionhelper/chronicle-bot:dev
    restart: unless-stopped
    depends_on:
      data-api:
        condition: service_started
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DATA_API_URL: http://data-api:8001
      DATA_API_SHARED_SECRET: ${SHARED_SECRET}
      LOCAL_BUFFER_DIR: /var/buffer
      MIN_PARTICIPANTS: ${MIN_PARTICIPANTS:-1}
      REQUIRE_ALL_CONSENT: ${REQUIRE_ALL_CONSENT:-true}
      RUST_LOG: chronicle_bot=info,info
    volumes:
      - collector-buffer:/var/buffer
    networks:
      - ovp

volumes:
  ovp-postgres:
  collector-buffer:

networks:
  ovp:
    name: ovp
