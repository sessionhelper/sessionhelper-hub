# OVP dev stack — canonical compose file.
#
# Copied to each VPS as /opt/ovp/docker-compose.yml. A `.env` file lives
# alongside it (chmod 600, not committed) supplying the variables below.
#
# Services share the `ovp` bridge network so they address each other by
# service name (e.g. collector → data-api:8001).
#
# Required env vars:
#   POSTGRES_PASSWORD       — container postgres password
#   S3_ENDPOINT             — S3-compatible endpoint URL
#   S3_ACCESS_KEY           — S3 access key id
#   S3_SECRET_KEY           — S3 secret key
#   S3_BUCKET               — target bucket for audio + metadata
#   SHARED_SECRET           — cross-service auth token (see CLAUDE.md)
#   DISCORD_TOKEN           — Discord bot application token
#
# Optional:
#   MIN_PARTICIPANTS        — default 1 (solo). Set to 2+ for quorum.
#   REQUIRE_ALL_CONSENT     — default true. Set false to allow partial consent.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ovp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ovp_data_api
    volumes:
      - ovp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovp -d ovp_data_api"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ovp

  data-api:
    image: ghcr.io/sessionhelper/chronicle-data-api:branch-main
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ovp:${POSTGRES_PASSWORD}@postgres:5432/ovp_data_api
      BIND_ADDR: 0.0.0.0:8001
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      SHARED_SECRET: ${SHARED_SECRET}
      RUST_LOG: chronicle_data_api=info,tower_http=info
    # Loopback-only on host; sibling containers reach it via the ovp network.
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - ovp

  collector:
    image: ghcr.io/sessionhelper/chronicle-bot:branch-main
    restart: unless-stopped
    depends_on:
      data-api:
        condition: service_started
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DATA_API_URL: http://data-api:8001
      DATA_API_SHARED_SECRET: ${SHARED_SECRET}
      LOCAL_BUFFER_DIR: /var/buffer
      MIN_PARTICIPANTS: ${MIN_PARTICIPANTS:-1}
      REQUIRE_ALL_CONSENT: ${REQUIRE_ALL_CONSENT:-true}
      # Comma-separated Discord user IDs that auto-consent at session start
      # without clicking the consent button. **Dev/E2E harness only.**
      # Defaults to empty (no bypass) — prod must leave this unset.
      BYPASS_CONSENT_USER_IDS: ${BYPASS_CONSENT_USER_IDS:-}
      # Dev-only E2E harness HTTP endpoint (POST /record, POST /stop,
      # GET /health). When enabled, lets an external test runner drive
      # the collector without a Discord client. Default false — prod
      # leaves this unset and the axum task is never spawned.
      HARNESS_ENABLED: ${HARNESS_ENABLED:-false}
      HARNESS_PORT: "8010"
      # Bind the harness server to all interfaces inside the container so
      # Docker's 127.0.0.1:PORT:PORT mapping can reach it via docker-proxy.
      # Host-side safety is still enforced by the loopback-only port mapping.
      HARNESS_BIND: "0.0.0.0"
      # serenity::gateway=info surfaces RESUME/RECONNECT events so we can
      # tell whether "Unknown interaction" ack failures correlate with a
      # resume replaying already-acked events. Bumping the crate floor
      # stays quieter than a global `debug`.
      RUST_LOG: chronicle_bot=info,serenity::gateway=info,info
    ports:
      # Loopback-only. The harness endpoint is unreachable from the
      # public internet; only other processes on the host can talk to it.
      - "127.0.0.1:8010:8010"
    volumes:
      - collector-buffer:/var/buffer
    networks:
      - ovp

  # --- E2E test harness: feeder bot fleet ---
  #
  # Four headless Discord bots ("Moe", "Larry", "Curly", "Gygax") that each
  # join a voice channel and play a pre-recorded WAV on command. They're
  # driven by an external test runner via a loopback HTTP control API.
  #
  # Dev-only. Each needs its own Discord bot token supplied via .env:
  #   FEEDER_TOKEN_MOE, FEEDER_TOKEN_LARRY, FEEDER_TOKEN_CURLY, FEEDER_TOKEN_GYGAX
  #
  # Control ports 8003-8006 are exposed on loopback only.

  worker:
    image: ghcr.io/sessionhelper/chronicle-worker:branch-main
    restart: unless-stopped
    depends_on:
      data-api:
        condition: service_started
    # Host network so the worker can reach the SSH reverse tunnel on
    # localhost:8300 (Whisper) without Docker bridge NAT issues. Also
    # reaches the data-api at localhost:8001 (its loopback port mapping).
    # Trade-off: Docker DNS (service names) don't work — use localhost.
    network_mode: host
    environment:
      DATA_API_URL: http://localhost:8001
      DATA_API_SHARED_SECRET: ${SHARED_SECRET}
      POLL_INTERVAL_SECS: "10"
      WHISPER_URL: ${WHISPER_URL:-http://localhost:8300/v1/audio/transcriptions}
      WHISPER_MODEL: ${WHISPER_MODEL:-deepdml/faster-whisper-large-v3-turbo-ct2}
      # Optional Whisper tuning knobs. All have worker-side defaults;
      # these surface them so a dev can iterate without rebuilding.
      # `INITIAL_PROMPT` primes Whisper with domain vocabulary — leave
      # empty in prod, set per-session once the BFF or worker wires it.
      WHISPER_INITIAL_PROMPT: ${WHISPER_INITIAL_PROMPT:-}
      WHISPER_TEMPERATURE: ${WHISPER_TEMPERATURE:-0.0}
      WHISPER_BEAM_SIZE: ${WHISPER_BEAM_SIZE:-5}
      WHISPER_NO_SPEECH_THRESHOLD: ${WHISPER_NO_SPEECH_THRESHOLD:-0.6}
      WHISPER_COMPRESSION_RATIO_THRESHOLD: ${WHISPER_COMPRESSION_RATIO_THRESHOLD:-2.4}
      VAD_MODEL_PATH: /app/models/silero_vad_v6.onnx
      # VAD defaults (0.5 / 250 / 800 / 100) drop short TTRPG utterances;
      # the values below are the tuned dev-VPS baseline. Override per env.
      VAD_THRESHOLD: ${VAD_THRESHOLD:-0.3}
      VAD_MIN_SPEECH_MS: ${VAD_MIN_SPEECH_MS:-150}
      VAD_MIN_SILENCE_MS: ${VAD_MIN_SILENCE_MS:-500}
      VAD_PAD_MS: ${VAD_PAD_MS:-200}
      # Filter default max_cps (25) rejects short legit utterances (e.g.
      # 14 chars in 468ms = 29.9 cps); 35 leaves headroom.
      FILTER_MIN_CONFIDENCE: ${FILTER_MIN_CONFIDENCE:--1.5}
      FILTER_MAX_CPS: ${FILTER_MAX_CPS:-35}
      FILTER_MIN_ALPHA: ${FILTER_MIN_ALPHA:-2}
      RUST_LOG: ${WORKER_RUST_LOG:-chronicle_worker=info,chronicle_pipeline=info}

  # Feeder audio: bind-mount the host session audio directory into each
  # container at /test-audio (read-only). AUDIO_FILE points at a
  # pre-encoded OGG Opus file so songbird's passthrough path forwards
  # packets unchanged (no decode/reencode). Encode with
  # `chronicle-feeder/scripts/encode-opus.sh` before uploading to the VPS.
  #
  # Fallback: if the mount is removed, switch AUDIO_FILE back to the
  # baked-in /assets/{name}.ogg and drop the volumes: block.

  feeder-moe:
    image: ghcr.io/sessionhelper/chronicle-feeder:branch-main
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${FEEDER_TOKEN_MOE}
      FEEDER_NAME: moe
      AUDIO_FILE: /test-audio/moe_torvin.ogg
      CONTROL_PORT: "8003"
      RUST_LOG: info,serenity=warn,songbird=warn
      # Bind the control server to all interfaces inside the container so
      # Docker's 127.0.0.1:PORT:PORT mapping can reach it. Host-side safety
      # is still enforced by the loopback-only port mapping.
      CONTROL_BIND: "0.0.0.0"
    volumes:
      - /opt/ovp/test-audio:/test-audio:ro
    ports:
      - "127.0.0.1:8003:8003"
    networks:
      - ovp

  feeder-larry:
    image: ghcr.io/sessionhelper/chronicle-feeder:branch-main
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${FEEDER_TOKEN_LARRY}
      FEEDER_NAME: larry
      AUDIO_FILE: /test-audio/larry_sera.ogg
      CONTROL_PORT: "8004"
      RUST_LOG: info,serenity=warn,songbird=warn
      # Bind the control server to all interfaces inside the container so
      # Docker's 127.0.0.1:PORT:PORT mapping can reach it. Host-side safety
      # is still enforced by the loopback-only port mapping.
      CONTROL_BIND: "0.0.0.0"
    volumes:
      - /opt/ovp/test-audio:/test-audio:ro
    ports:
      - "127.0.0.1:8004:8004"
    networks:
      - ovp

  feeder-curly:
    image: ghcr.io/sessionhelper/chronicle-feeder:branch-main
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${FEEDER_TOKEN_CURLY}
      FEEDER_NAME: curly
      AUDIO_FILE: /test-audio/curly_pip.ogg
      CONTROL_PORT: "8005"
      RUST_LOG: info,serenity=warn,songbird=warn
      # Bind the control server to all interfaces inside the container so
      # Docker's 127.0.0.1:PORT:PORT mapping can reach it. Host-side safety
      # is still enforced by the loopback-only port mapping.
      CONTROL_BIND: "0.0.0.0"
    volumes:
      - /opt/ovp/test-audio:/test-audio:ro
    ports:
      - "127.0.0.1:8005:8005"
    networks:
      - ovp

  feeder-gygax:
    image: ghcr.io/sessionhelper/chronicle-feeder:branch-main
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${FEEDER_TOKEN_GYGAX}
      FEEDER_NAME: gygax
      AUDIO_FILE: /test-audio/gygax_gm.ogg
      CONTROL_PORT: "8006"
      RUST_LOG: info,serenity=warn,songbird=warn
      # Bind the control server to all interfaces inside the container so
      # Docker's 127.0.0.1:PORT:PORT mapping can reach it. Host-side safety
      # is still enforced by the loopback-only port mapping.
      CONTROL_BIND: "0.0.0.0"
    volumes:
      - /opt/ovp/test-audio:/test-audio:ro
    ports:
      - "127.0.0.1:8006:8006"
    networks:
      - ovp

  # --- Portal: Next.js BFF + UI ---
  #
  # Serves the three role surfaces (Admin / GM / Player / Public) and holds
  # SHARED_SECRET to call data-api. Behind Caddy TLS on dev.sessionhelper.com.
  # Loopback-only port mapping; public access routes through Caddy.
  portal:
    image: ghcr.io/sessionhelper/chronicle-portal:branch-main
    restart: unless-stopped
    depends_on:
      data-api:
        condition: service_started
    environment:
      DATA_API_URL: http://data-api:8001
      SHARED_SECRET: ${SHARED_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://dev.sessionhelper.com}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      WORKER_ADMIN_URL: ${WORKER_ADMIN_URL:-http://worker:8020}
      NODE_ENV: production
      BIND_ADDR: 0.0.0.0:3000
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - ovp

volumes:
  ovp-postgres:
  collector-buffer:

networks:
  ovp:
    name: ovp
