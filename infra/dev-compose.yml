# OVP dev stack — canonical compose file.
#
# Copied to each VPS as /opt/ovp/docker-compose.yml. A `.env` file lives
# alongside it (chmod 600, not committed) supplying the variables below.
#
# Services share the `ovp` bridge network so they address each other by
# service name (e.g. collector → data-api:8001).
#
# Required env vars:
#   POSTGRES_PASSWORD       — container postgres password
#   S3_ENDPOINT             — S3-compatible endpoint URL
#   S3_ACCESS_KEY           — S3 access key id
#   S3_SECRET_KEY           — S3 secret key
#   S3_BUCKET               — target bucket for audio + metadata
#   SHARED_SECRET           — cross-service auth token (see CLAUDE.md)
#   DISCORD_TOKEN           — Discord bot application token
#
# Optional:
#   MIN_PARTICIPANTS        — default 1 (solo). Set to 2+ for quorum.
#   REQUIRE_ALL_CONSENT     — default true. Set false to allow partial consent.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ovp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ovp_data_api
    volumes:
      - ovp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovp -d ovp_data_api"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ovp

  data-api:
    image: ghcr.io/sessionhelper/ovp-data-api:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ovp:${POSTGRES_PASSWORD}@postgres:5432/ovp_data_api
      BIND_ADDR: 0.0.0.0:8001
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      SHARED_SECRET: ${SHARED_SECRET}
      RUST_LOG: ovp_data_api=info,tower_http=info
    # Loopback-only on host; sibling containers reach it via the ovp network.
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - ovp

  collector:
    image: ghcr.io/sessionhelper/ttrpg-collector:dev
    restart: unless-stopped
    depends_on:
      data-api:
        condition: service_started
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DATA_API_URL: http://data-api:8001
      DATA_API_SHARED_SECRET: ${SHARED_SECRET}
      LOCAL_BUFFER_DIR: /var/buffer
      MIN_PARTICIPANTS: ${MIN_PARTICIPANTS:-1}
      REQUIRE_ALL_CONSENT: ${REQUIRE_ALL_CONSENT:-true}
      RUST_LOG: ttrpg_collector=info,info
    volumes:
      - collector-buffer:/var/buffer
    networks:
      - ovp

  # --- E2E test harness: feeder bot fleet ---
  #
  # Four headless Discord bots ("Moe", "Larry", "Curly", "Gygax") that each
  # join a voice channel and play a pre-recorded WAV on command. They're
  # driven by an external test runner via a loopback HTTP control API.
  #
  # Dev-only. Each needs its own Discord bot token supplied via .env:
  #   FEEDER_TOKEN_MOE, FEEDER_TOKEN_LARRY, FEEDER_TOKEN_CURLY, FEEDER_TOKEN_GYGAX
  #
  # Control ports 8003-8006 are exposed on loopback only.

  feeder-moe:
    image: ghcr.io/sessionhelper/ttrpg-collector-feeder:dev
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${FEEDER_TOKEN_MOE}
      FEEDER_NAME: moe
      AUDIO_FILE: /assets/moe.wav
      CONTROL_PORT: "8003"
      RUST_LOG: info,serenity=warn,songbird=warn
    ports:
      - "127.0.0.1:8003:8003"
    volumes:
      - ./assets:/assets:ro
    networks:
      - ovp

  feeder-larry:
    image: ghcr.io/sessionhelper/ttrpg-collector-feeder:dev
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${FEEDER_TOKEN_LARRY}
      FEEDER_NAME: larry
      AUDIO_FILE: /assets/larry.wav
      CONTROL_PORT: "8004"
      RUST_LOG: info,serenity=warn,songbird=warn
    ports:
      - "127.0.0.1:8004:8004"
    volumes:
      - ./assets:/assets:ro
    networks:
      - ovp

  feeder-curly:
    image: ghcr.io/sessionhelper/ttrpg-collector-feeder:dev
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${FEEDER_TOKEN_CURLY}
      FEEDER_NAME: curly
      AUDIO_FILE: /assets/curly.wav
      CONTROL_PORT: "8005"
      RUST_LOG: info,serenity=warn,songbird=warn
    ports:
      - "127.0.0.1:8005:8005"
    volumes:
      - ./assets:/assets:ro
    networks:
      - ovp

  feeder-gygax:
    image: ghcr.io/sessionhelper/ttrpg-collector-feeder:dev
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${FEEDER_TOKEN_GYGAX}
      FEEDER_NAME: gygax
      AUDIO_FILE: /assets/gygax.wav
      CONTROL_PORT: "8006"
      RUST_LOG: info,serenity=warn,songbird=warn
    ports:
      - "127.0.0.1:8006:8006"
    volumes:
      - ./assets:/assets:ro
    networks:
      - ovp

volumes:
  ovp-postgres:
  collector-buffer:

networks:
  ovp:
    name: ovp
